<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f5f1" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16181b" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="StreakGrid: a habit tracker with a contribution grid per habit. Data stays in your browser and your own Google Drive.">
<title>StreakGrid</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
<div class="shell">
  <header class="app">
    <h1>StreakGrid</h1>
    <span class="sub"><span id="subline">local</span><span class="syncdot" id="syncdot"></span></span>
  </header>
  <main id="view"></main>
</div>
<button class="fab" id="fab">+</button>
<nav class="tabs" id="tabs">
  <button data-tab="today"><span class="ico">✓</span>Today</button>
  <button data-tab="analytics"><span class="ico">▲</span>Analytics</button>
  <button data-tab="settings"><span class="ico">⚙</span>Settings</button>
  <button data-tab="help"><span class="ico">?</span>Help</button>
</nav>
<div id="modal"></div>
<input type="file" id="importfile" accept="application/json" class="hidden">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/config.js"></script>
<script src="js/logic.js"></script>
<script src="js/store.js"></script>
<script src="js/gdrive.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
</body>
</html>
