<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e8eef4" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#12161d" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="Habit tracker with a GitHub-style contribution grid. Data stays in your browser and your own Google Drive.">
<title>Daycells</title>
<!-- Open Graph / WhatsApp / iMessage / LinkedIn -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Daycells">
<meta property="og:url" content="https://daycells.vercel.app/">
<meta property="og:title" content="Daycells">
<meta property="og:description" content="Habit tracker with a GitHub-style contribution grid. Data stays in your browser and your own Google Drive.">
<meta property="og:image" content="https://daycells.vercel.app/images/og-image.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Daycells habit tracker with a contribution-style grid">
<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Daycells">
<meta name="twitter:description" content="Habit tracker with a GitHub-style contribution grid. Data stays in your browser and your own Google Drive.">
<meta name="twitter:image" content="https://daycells.vercel.app/images/og-image.jpg">
<link rel="canonical" href="https://daycells.vercel.app/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
</head>
<body>
<div class="shell">
  <header class="app">
    <h1 class="brand"><span class="brand-day">Day</span><span class="brand-cells">cells</span></h1>
    <div class="header-right">
      <button type="button" class="report-btn hidden" id="reportbtn" aria-label="Report a problem" title="Report a problem">
        <svg class="ico" viewBox="0 0 18 18" aria-hidden="true"><path d="M9 2.5l6.5 12.2H2.5L9 2.5z" fill="none"/><path d="M9 7v3.2"/><circle cx="9" cy="12.2" r="0.7" fill="currentColor" stroke="none"/></svg>
        <span class="report-lbl">Report</span>
      </button>
      <span class="sub"><span id="subline">local</span><span class="syncdot" id="syncdot"></span></span>
    </div>
  </header>
  <main id="view"></main>
</div>
<button class="fab" id="fab" aria-label="Add habit">+</button>
<nav class="tabs" id="tabs">
  <button data-tab="habits" type="button">
    <svg class="ico" viewBox="0 0 18 18" aria-hidden="true"><rect x="3" y="3" width="12" height="12" rx="2"/><path d="M6 9.2l2 2 4-4.2"/></svg>
    Habits
  </button>
  <button data-tab="analytics" type="button">
    <svg class="ico" viewBox="0 0 18 18" aria-hidden="true"><rect x="2" y="2" width="5" height="5" rx="0.5"/><rect x="11" y="2" width="5" height="5" rx="0.5"/><rect x="2" y="11" width="5" height="5" rx="0.5"/><rect x="11" y="11" width="5" height="5" rx="0.5"/></svg>
    Analytics
  </button>
  <button data-tab="settings" type="button">
    <svg class="ico" viewBox="0 0 18 18" aria-hidden="true"><circle cx="9" cy="9" r="2.5"/><path d="M9 1.8v2.2M9 14v2.2M1.8 9h2.2M14 9h2.2M3.4 3.4l1.6 1.6M13 13l1.6 1.6M14.6 3.4L13 5M5 13l-1.6 1.6"/></svg>
    Settings
  </button>
  <button data-tab="help" type="button">
    <svg class="ico" viewBox="0 0 18 18" aria-hidden="true"><circle cx="9" cy="9" r="6.5"/><path d="M7.2 7.1a1.9 1.9 0 012.3-1.7c1.1.2 1.8 1 1.8 2.1 0 1.3-1.2 1.7-1.9 2.1-.5.3-.8.7-.8 1.3"/><circle cx="9" cy="13.2" r="0.7" fill="currentColor" stroke="none"/></svg>
    Help
  </button>
</nav>
<div id="modal"></div>
<input type="file" id="importfile" accept="application/json" class="hidden">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/config.js"></script>
<script src="js/logic.js"></script>
<script src="js/store.js"></script>
<script src="js/sample.js"></script>
<script src="js/gdrive.js"></script>
<script src="js/sync.js"></script>
<script src="js/redact.js"></script>
<script src="js/feedback.js"></script>
<script src="js/app.js"></script>
</body>
</html>
